name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run Swift tests
        # Swift Testing's parallel runner can stall on GitHub's macOS runner
        # when several AsyncStream-based tests finish at the same time.
        run: swift test --no-parallel

      - name: Build unsigned app
        run: >-
          xcodebuild
          -project HerdEye.xcodeproj
          -scheme HerdEye
          -configuration Debug
          -sdk macosx
          -derivedDataPath "$RUNNER_TEMP/DerivedData"
          CODE_SIGNING_ALLOWED=NO
          build
