# XcodeGen project definition for HerdEye, a minimal menu bar app.
# Run `xcodegen generate` after adding files to update the project.
name: HerdEye

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.45.4"

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic

targets:
  # Non-sandboxed (required for Unix socket access).
  # LSUIElement hides the app from the Dock and displays no window.
  # Agent status is shown as a 3x3 dot grid.
  HerdEye:
    type: application
    platform: macOS
    sources:
      - path: HerdEye
        excludes:
          - "HerdEye.entitlements"
          - "Info.plist"
    configFiles:
      Debug: Config/Shared.xcconfig
      Release: Config/Shared.xcconfig
    info:
      path: HerdEye/Info.plist
      properties:
        CFBundleDisplayName: HerdEye
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: HerdEyeIcon
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "26.0"
        LSUIElement: true
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        CODE_SIGN_ENTITLEMENTS: HerdEye/HerdEye.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: "HerdEyeIcon"

  HerdEyeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HerdEyeTests
    dependencies:
      - target: HerdEye
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.HerdEyeTests

schemes:
  HerdEye:
    build:
      targets:
        HerdEye: all
    test:
      config: Debug
      targets:
        - name: HerdEyeTests
    run:
      config: Debug
